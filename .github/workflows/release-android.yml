name: Release Android

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the android build to (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: core/Cargo.toml

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Update integrity
        run: |
          echo '#[cfg(feature = "with_integrity")]
              pub fn get_integrity_hash() -> String {
                  "${{ secrets.INTEGRITY_HASH }}".to_string()
              }
          ' > core/src/modules/integrity.rs
          echo 'Updated with integrity hash!'

      - name: Build
        working-directory: core
        run: cross build --target aarch64-linux-android --features with_integrity --release

      - name: Set version
        run: echo "VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> $GITHUB_ENV

      - name: Install patchelf
        run: |
          curl -fsSL https://github.com/NixOS/patchelf/releases/download/0.15.5/patchelf-0.15.5-x86_64.tar.gz \
            | tar -xzO ./bin/patchelf > /usr/local/bin/patchelf
          chmod +x /usr/local/bin/patchelf
          patchelf --version

      - name: Prepare release folder
        run: |
          mkdir -p balatro-vs/lovely
          cp patchs/* balatro-vs/lovely/
          cp core/target/aarch64-linux-android/release/libwinmm.so balatro-vs/lovely/
          patchelf --add-needed liblove.so balatro-vs/lovely/libwinmm.so
          sed -i 's|"protocol": "ws"|"protocol": "wss"|g' balatro-vs/lovely/bvs.json
          sed -i 's|"host": "localhost"|"host": "live.balatro-vs-matchmaking.eu"|g' balatro-vs/lovely/bvs.json
          sed -i 's|"port": 3536|"port": 0|g' balatro-vs/lovely/bvs.json

      - name: Archive
        run: zip -r balatro-vs-${{ env.VERSION }}-android.zip balatro-vs/

      - name: Upload Release
        uses: ncipollo/release-action@v1.12.0
        with:
          artifacts: "balatro-vs-${{ env.VERSION }}-android.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.VERSION }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
